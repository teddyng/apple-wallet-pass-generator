services:
  - type: web
    name: apple-wallet-pass-generator
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: STORED_P12_BASE64
        sync: false
      - key: STORED_P12_PASSWORD
        sync: false
      - key: STORED_WWDR_BASE64
        sync: false
