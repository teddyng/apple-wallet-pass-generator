<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | Wallet Pass Studio</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/theme.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <span class="eyebrow">Apple Wallet</span>
          <h1>Admin</h1>
        </div>
        <div class="top-actions">
          <button class="secondary-button" type="button" data-theme-toggle>Dark mode</button>
          <a class="secondary-button" href="/">Studio</a>
          <a class="secondary-button" href="/logout">Sign out</a>
        </div>
      </header>

      <section class="admin-shell">
        <div class="admin-status" id="adminStatus" role="status">Loading requests...</div>

        <div class="admin-grid">
          <section class="admin-panel">
            <div class="panel-heading">
              <h2>Account Requests</h2>
            </div>
            <div class="admin-list" id="pendingUsers"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-heading">
              <h2>Password Resets</h2>
            </div>
            <div class="admin-list" id="pendingResets"></div>
          </section>

          <section class="admin-panel span-2">
            <div class="panel-heading">
              <h2>Users</h2>
            </div>
            <div class="admin-list" id="allUsers"></div>
          </section>
        </div>
      </section>

      <footer class="site-footer">
        <span>Created by Teddy Ng. Powered by Codex. Hosted by Render and Neon.</span>
      </footer>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
